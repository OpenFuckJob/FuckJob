name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install frontend dependencies
        env:
          PNPM_ALLOW_SCRIPTS: "true"
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm tsc --noEmit

      - name: Run frontend tests
        run: pnpm test:run

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev

      - name: Cargo check (Rust)
        working-directory: src-tauri
        run: cargo check

      - name: Cargo test (Rust)
        working-directory: src-tauri
        run: cargo test

  build:
    needs: test
    if: github.event_name == 'push'
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: fuckJob-macos-dmg
          - os: windows-latest
            artifact: fuckJob-windows-msi
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install frontend dependencies
        env:
          PNPM_ALLOW_SCRIPTS: "true"
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup C++ toolchain (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "CC=$(xcrun -f clang)" >> "$GITHUB_ENV"
          echo "CXX=$(xcrun -f clang++)" >> "$GITHUB_ENV"
          xcrun --show-sdk-path > /dev/null 2>&1

      - name: Build Tauri app
        run: pnpm tauri build --ci

      - name: Upload macOS .dmg
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload Windows .msi
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
